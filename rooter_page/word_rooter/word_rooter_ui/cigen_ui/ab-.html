<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>CodePen - #CodePenChallenge Interactive and Responsive Card with Space Theme</title>
  <link href="https://fonts.googleapis.com/css2?family=Inconsolata&family=VT323&display=swap" rel="stylesheet"><link rel="stylesheet" href="./style.css">

</head>
<body>
<!-- partial:index.partial.html -->
<div class="artboard">
 <div class="card">

  <div class="card__side card__side--back">
   <div class="card__cover">
    <h4 class="card__heading">
     <span class="card__heading-span">ab-</span>
    </h4>
   </div>
   <div class="card__details">
    <ul>
     <li>含义：分离,脱离;相反;加强意义</li>
     <li>ab-, abs- 加在词根前, 表示"相反, 变坏, 离去"等</li>
     <li>ab-, ac-, ad-, af-, ag-, an-, ap-, ar-, as-, at- 等加在同辅音字母的词根前, 表示"一再"等加强意义</li>
     <li>ab- 离去、相反、不</li>
     <li>abnormal 反常的（ab+normal正常的）</li>
     <li>absent 缺席的（ab+sent出现→没有出现→缺席的）</li>
    </ul>
   </div>
  </div>

  <div class="card__side card__side--front">
   <div class="card__theme">
    <div class="card__theme-box">
     <p class="card__subject" style="font-size: 100px;">前缀</p>
     <p class="card__title"><span style="font-size: 100px;">ab-</span></p>
    </div>
   </div>
  </div>

 </div>
</div>
<!-- partial -->
  
</body>
</html>
